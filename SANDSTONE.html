<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sandstone Varieties — Oranta Ventures</title>

    <style>
        :root {
            --bg: #ffffff;
            --muted: #666;
            --card-shadow: 0 6px 18px rgba(10, 10, 10, .06);
            --max-width: 1100px;
        }

        * {
            box-sizing: border-box
        }

        body {
            font-family: Inter, system-ui, Arial, sans-serif;
            margin: 0;
            background: var(--bg);
            color: #222;
            padding: 30px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: var(--max-width);
        }

        header {
            background: #111;
            color: #fff;
            padding: 8px 12px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 24px;
        }

        header h1 {
            margin: 0;
            font-size: 22px;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 18px;
        }

        /* CARD */
        .card {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: .25s;
            box-shadow: var(--card-shadow);
        }

        .card:hover {
            transform: translateY(-4px)
        }

        .thumb {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
        }

        .card-body {
            padding: 12px;
            text-align: center;
        }

        .product-name {
            font-weight: 600;
            font-size: 15.5px;
        }

        /* PAGINATION */
        .pagination {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 18px 0;
        }

        .pg-btn {
            background: #111;
            color: #fff;
            border-radius: 8px;
            padding: 8px 12px;
            border: none;
            cursor: pointer;
        }

        .pg-btn[disabled] {
            opacity: .4;
            cursor: not-allowed;
        }

        /* MODAL */
        .modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, .5);
            z-index: 999;
            padding: 20px;
        }

        .modal.show {
            display: flex
        }

        .modal-card {
            background: #fff;
            width: 100%;
            max-width: 900px;
            border-radius: 12px;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 380px;
            max-height: 90vh;
        }

        .modal-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-details {
            padding: 18px;
            overflow: auto;
        }

        .specs {
            color: var(--muted);
            font-size: 15px;
            margin-bottom: 8px;
        }

        .spec-title {
            font-weight: 700;
            color: #222;
            margin-right: 6px;
        }

        .close-btn {
            margin-top: 10px;
            background: #111;
            color: #fff;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        @media(max-width:880px) {
            .modal-card {
                grid-template-columns: 1fr
            }

            .modal-image {
                max-height: 40vh
            }
        }

        footer {
            text-align: center;
            margin-top: 18px;
            color: var(--muted);
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="container">

        <header>
            <h1>Sandstone Varieties</h1>
        </header>

        <main>
            <div id="grid" class="grid"></div>

            <div class="pagination">
                <button class="pg-btn" id="prevBtn">Previous</button>
                <button class="pg-btn" id="nextBtn">Next</button>
            </div>
        </main>

        <footer>© 2025 Oranta Ventures Pvt Ltd • All Rights Reserved</footer>

    </div>

    <!-- MODAL -->
    <div id="modal" class="modal">
        <div class="modal-card">
            <img id="modalImg" class="modal-image">
            <div class="modal-details">
                <h2 id="modalTitle"></h2>
                <p class="specs"><span class="spec-title">Origin:</span><span id="specOrigin"></span></p>
                <p class="specs"><span class="spec-title">Appearance:</span><span id="specAppearance"></span></p>
                <p class="specs"><span class="spec-title">Finishes:</span><span id="specFinishes"></span></p>
                <p class="specs"><span class="spec-title">Thickness:</span><span id="specThickness"></span></p>
                <p class="specs"><span class="spec-title">Properties:</span><span id="specProperties"></span></p>
                <button class="close-btn" id="closeModal">Close</button>
            </div>
        </div>
    </div>

    <script>
        const sandstoneData = [
            {
                name: "Teakwood Sandstone",
                image: "images/sandstone.teakwood.jpeg",
                origin: "Rajasthan, India",
                appearance: "Wood-like linear grain in golden tones",
                finishes: "Natural, Honed",
                thickness: "20mm, 25mm",
                properties: "Slip-resistant, weather durable"
            },
            {
                name: "Rainbow Sandstone",
                image: "images/sandstone.rainbow.jpeg",
                origin: "Rajasthan, India",
                appearance: "Multicolor flowing bands",
                finishes: "Natural, Honed",
                thickness: "20mm, 25mm",
                properties: "Decorative, unique patterns"
            },
            {
                name: "Fossil Mint",
                image: "images/sandstone.fossilmint.jpeg",
                origin: "Rajasthan, India",
                appearance: "Mint green with fossil textures",
                finishes: "Natural",
                thickness: "20mm",
                properties: "Natural fossil look, durable"
            },
            {
                name: "Kandla Grey",
                image: "images/sandstone.kandlagrey.jpeg",
                origin: "Gujarat, India",
                appearance: "Uniform grey tone",
                finishes: "Natural, Shot-blasted",
                thickness: "20mm, 25mm",
                properties: "High strength, anti-slip"
            },
            {
                name: "Raj Green",
                image: "images/sandstone.rajgreen.jpeg",
                origin: "Rajasthan, India",
                appearance: "Green base with subtle veins",
                finishes: "Natural",
                thickness: "20mm, 25mm",
                properties: "Outdoor friendly, earthy tone"
            },
            {
                name: "Autumn Brown",
                image: "images/sandstone.autumnbrown.jpeg",
                origin: "Rajasthan, India",
                appearance: "Brown shades with natural variation",
                finishes: "Natural",
                thickness: "20mm",
                properties: "Rustic look, durable"
            },
            {
                name: "Mandana Red",
                image: "images/sanstone.mandana red.jpeg",
                origin: "Rajasthan, India",
                appearance: "Deep red uniform surface",
                finishes: "Natural",
                thickness: "20mm",
                properties: "Traditional look, strong"
            },
            {
                name: "Dholpur Pink",
                image: "images/sandstone.dholpur pink.jpeg",
                origin: "Rajasthan, India",
                appearance: "Soft pink smooth texture",
                finishes: "Honed",
                thickness: "20mm",
                properties: "Fine grain, elegant"
            },
            {
                name: "Dholpur Beige",
                image: "images/sandstone.dholpurbeige.jpeg",
                origin: "Rajasthan, India",
                appearance: "Creamy beige uniform surface",
                finishes: "Honed",
                thickness: "20mm",
                properties: "Classic, timeless stone"
            }
        ];

        const perPage = 25;
        let currentPage = 1;
        const totalPages = Math.ceil(sandstoneData.length / perPage);

        const grid = document.getElementById("grid");
        const modal = document.getElementById("modal");

        function renderPage() {
            grid.innerHTML = "";
            sandstoneData.forEach((item, i) => {
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
      <img src="${item.image}" class="thumb" loading="lazy">
      <div class="card-body"><div class="product-name">${item.name}</div></div>`;
                card.onclick = () => openModal(i);
                grid.appendChild(card);
            });
        }

        function openModal(i) {
            const d = sandstoneData[i];
            modal.classList.add("show");
            document.getElementById("modalImg").src = d.image;
            document.getElementById("modalTitle").innerText = d.name;
            document.getElementById("specOrigin").innerText = d.origin;
            document.getElementById("specAppearance").innerText = d.appearance;
            document.getElementById("specFinishes").innerText = d.finishes;
            document.getElementById("specThickness").innerText = d.thickness;
            document.getElementById("specProperties").innerText = d.properties;
        }

        document.getElementById("closeModal").onclick = () => modal.classList.remove("show");
        modal.onclick = e => { if (e.target === modal) modal.classList.remove("show") }

        renderPage();
    </script>

</body>


</html>
