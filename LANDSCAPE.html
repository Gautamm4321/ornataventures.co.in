<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Landscape Cobbles — Oranta Ventures</title>

    <style>
        :root {
            --bg: #ffffff;
            --muted: #666;
            --card-shadow: 0 6px 18px rgba(10, 10, 10, .06);
            --max-width: 1100px;
        }

        * { box-sizing: border-box }

        body {
            margin: 0;
            padding: 30px;
            font-family: Inter, system-ui, Arial, sans-serif;
            background: var(--bg);
            color: #222;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: var(--max-width);
        }

        header {
            background: #111;
            color: #fff;
            padding: 6px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 24px;
        }

        header h1 {
            margin: 0;
            font-size: 22px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 18px;
        }

        .card {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: var(--card-shadow);
            transition: .25s;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        .thumb {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }

        .card-body {
            padding: 12px;
            text-align: center;
        }

        .product-name {
            font-weight: 600;
            font-size: 15.5px;
        }

        /* MODAL */
        .modal {
            position: fixed;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, .5);
            z-index: 999;
            padding: 20px;
        }

        .modal.show { display: flex }

        .modal-card {
            background: #fff;
            border-radius: 12px;
            max-width: 900px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 380px;
            overflow: hidden;
        }

        .modal-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-details {
            padding: 18px;
            overflow: auto;
        }

        .modal-details h2 {
            margin-top: 0;
        }

        .specs {
            font-size: 15px;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .spec-title {
            font-weight: 700;
            color: #222;
        }

        .close-btn {
            background: #111;
            color: #fff;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }

        @media(max-width:850px) {
            .modal-card { grid-template-columns: 1fr }
            .modal-image { max-height: 40vh }
        }

        footer {
            text-align: center;
            margin-top: 18px;
            color: var(--muted);
            font-size: 14px;
        }
    </style>
</head>

<body>
<div class="container">

    <header>
        <h1>Landscape Cobbles</h1>
    </header>

    <div id="grid" class="grid"></div>

    <footer>© 2025 Oranta Ventures Pvt Ltd • All Rights Reserved</footer>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-card">
        <img id="modalImg" class="modal-image">
        <div class="modal-details">
            <h2 id="modalTitle"></h2>
            <p class="specs"><span class="spec-title">Origin:</span> <span id="origin"></span></p>
            <p class="specs"><span class="spec-title">Appearance:</span> <span id="appearance"></span></p>
            <p class="specs"><span class="spec-title">Finishes:</span> <span id="finishes"></span></p>
            <p class="specs"><span class="spec-title">Thickness:</span> <span id="thickness"></span></p>
            <p class="specs"><span class="spec-title">Properties:</span> <span id="properties"></span></p>
            <button class="close-btn" onclick="closeModal()">Close</button>
        </div>
    </div>
</div>

<script>
const landscapeData = [
    {
        name: "Black Granite Cobbles",
        image: "images/landscape.blackgranitecobbles.jpeg",
        origin: "South India",
        appearance: "Deep black color with fine crystalline texture",
        finishes: "Natural, Flamed",
        thickness: "40–60mm",
        properties: "Extremely durable, slip-resistant, weatherproof"
    },
    {
        name: "Beige Sandstone Cobbles",
        image: "images/Sandstone.beige sandstone cobbles landscape.jpeg",
        origin: "Rajasthan, India",
        appearance: "Soft beige tone with subtle natural grains",
        finishes: "Natural",
        thickness: "40–60mm",
        properties: "Warm look, ideal for pathways & patios"
    },
    {
        name: "Brown Sandstone Cobbles",
        image: "images/landscape.brownsandstonecobbles.jpeg",
        origin: "Rajasthan, India",
        appearance: "Earthy brown shades with natural variation",
        finishes: "Natural",
        thickness: "40–60mm",
        properties: "Rustic appearance, strong & durable"
    },
    {
        name: "Manga Pink Cobbles",
        image: "images/landscape.Manga pink cobbles.jpeg",
        origin: "Rajasthan, India",
        appearance: "Pink base with darker mineral specks",
        finishes: "Natural",
        thickness: "40–60mm",
        properties: "Decorative, long-lasting outdoor stone"
    },
    {
        name: "Grey Granite Cobbles",
        image: "images/landscape.Grey granite cobbles.jpeg",
        origin: "South India",
        appearance: "Consistent grey tone with granular texture",
        finishes: "Flamed, Natural",
        thickness: "40–60mm",
        properties: "High strength, low maintenance"
    },
    {
        name: "Red Sandstone Cobbles",
        image: "images/landscape.Red sandstone cobbles.jpeg",
        origin: "Rajasthan, India",
        appearance: "Rich red surface with uniform grain",
        finishes: "Natural",
        thickness: "40–60mm",
        properties: "Traditional look, excellent weather resistance"
    },
    {
        name: "Kota Brown Cobbles",
        image: "images/landscape.kotabrown cobbles.jpeg",
        origin: "Rajasthan, India",
        appearance: "Brownish-grey tone with fine texture",
        finishes: "Natural",
        thickness: "40–60mm",
        properties: "Economical, slip-resistant, durable"
    },
    {
        name: "Rainbow Sandstone Cobbles",
        image: "images/landscape.Rainbow sandstone cobbles.jpeg",
        origin: "Rajasthan, India",
        appearance: "Multicolor flowing patterns",
        finishes: "Natural",
        thickness: "40–60mm",
        properties: "Highly decorative, unique visual appeal"
    }
];

const grid = document.getElementById("grid");
const modal = document.getElementById("modal");

landscapeData.forEach((item, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
        <img class="thumb" src="${item.image}" alt="${item.name}" loading="lazy">
        <div class="card-body">
            <div class="product-name">${item.name}</div>
        </div>`;
    card.onclick = () => openModal(i);
    grid.appendChild(card);
});

function openModal(i) {
    const d = landscapeData[i];
    document.getElementById("modalImg").src = d.image;
    document.getElementById("modalTitle").innerText = d.name;
    document.getElementById("origin").innerText = d.origin;
    document.getElementById("appearance").innerText = d.appearance;
    document.getElementById("finishes").innerText = d.finishes;
    document.getElementById("thickness").innerText = d.thickness;
    document.getElementById("properties").innerText = d.properties;
    modal.classList.add("show");
}

function closeModal() {
    modal.classList.remove("show");
}

modal.onclick = e => { if (e.target === modal) closeModal(); }
</script>

</body>
</html>
