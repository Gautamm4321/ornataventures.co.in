<!doctype html>

<title>Granite Varieties — Oranta Ventures</title>

<style>
*{box-sizing:border-box}
body{margin:0;padding:20px;font-family:system-ui,Arial,sans-serif;background:#fff;color:#222}
.container{max-width:1200px;margin:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px}
.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 6px 18px rgba(0,0,0,.1);cursor:pointer;transition:.25s}
.card:hover{transform:translateY(-6px)}
.thumb{width:100%;aspect-ratio:1/1;object-fit:cover;display:block}
.card-body{text-align:center;padding:10px;font-weight:600}

header{
  background:#111;
  color:#fff;
  padding:10px 0;
  text-align:center;
  margin-bottom:24px;
  border-radius:6px;
}

header h1{
  margin:0;
  font-size:20px;
  font-weight:600;
  letter-spacing:0.5px;
}


/* modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;padding:20px;z-index:999}
.modal.show{display:flex}
.modal-card{background:#fff;width:100%;max-width:900px;border-radius:12px;overflow:hidden;display:grid;grid-template-columns:1fr 360px}
.modal-image{width:100%;height:100%;object-fit:cover}
.modal-details{padding:16px;overflow:auto}
.close-btn{margin-top:10px;background:#111;color:#fff;border:none;padding:8px 12px;border-radius:8px;cursor:pointer}
@media(max-width:850px){.modal-card{grid-template-columns:1fr}.modal-image{max-height:40vh}}
</style>
</head>

<div id="grid" class="grid"></div>
</div>

const grid = document.getElementById('grid');
const modal = document.getElementById('modal');

function render(){
  graniteData.forEach(g=>{
    const c=document.createElement('div');
    c.className='card';
    c.innerHTML=`<img class="thumb" src="${g.image}" onerror="this.style.opacity=.15"><div class="card-body">${g.name}</div>`;
    c.onclick=()=>openModal(g);
    grid.appendChild(c);
  });
}

function openModal(g){
  modal.classList.add('show');
  modalImg.src=g.image;
  modalTitle.textContent=g.name;
  specOrigin.textContent=g.origin;
  specAppearance.textContent=g.appearance;
  specFinishes.textContent=g.finishes;
  specThickness.textContent=g.thickness;
  specProperties.textContent=g.properties;
}

closeModal.onclick=()=>modal.classList.remove('show');
modal.onclick=e=>{if(e.target===modal)modal.classList.remove('show')}

render();
